services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: microtek_idm
      POSTGRES_USER: microtek
      POSTGRES_PASSWORD: microtek
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microtek -d microtek_idm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # One-shot: applies db/migrations before the server starts. Idempotent
  # (tracked in schema_migrations), reuses the server image.
  migrate:
    image: microtek-idm-server
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["npm", "run", "migrate"]
    environment:
      DATABASE_URL: postgres://microtek:microtek@db:5432/microtek_idm
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  server:
    image: microtek-idm-server
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      # Optional: load extra secrets (e.g. AUTH_TOKEN_SECRET, IMPORT_WEBHOOK_SECRET)
      # if present, but don't fail the stack when it is absent.
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://microtek:microtek@db:5432/microtek_idm
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8081
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "4001:4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4001/api
    depends_on:
      - server
    ports:
      - "8081:80"

volumes:
  postgres-data:
