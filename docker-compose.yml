services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: microtek_idm
      POSTGRES_USER: microtek
      POSTGRES_PASSWORD: microtek
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://microtek:microtek@db:5432/microtek_idm
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    ports:
      - "4000:4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres-data:
