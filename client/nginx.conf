server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown paths (client-side routes like /dispatch) must
    # fall back to index.html so React Router can handle them instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
